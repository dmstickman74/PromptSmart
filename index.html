<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptSmart</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* Setup screen */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 1.5rem;
    overflow-y: auto;
  }

  #setup h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
  }

  #setup p.subtitle {
    color: #888;
    font-size: 0.95rem;
    max-width: 500px;
    text-align: center;
    line-height: 1.5;
  }

  #script-input {
    width: 100%;
    max-width: 700px;
    height: 35vh;
    background: #141414;
    border: 1px solid #333;
    border-radius: 12px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 1rem;
    padding: 1.25rem;
    resize: none;
    outline: none;
    line-height: 1.7;
  }

  #script-input:focus { border-color: #4a9eff; }

  #script-input::placeholder { color: #555; }

  .setup-row {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    padding: 0.75rem 1.75rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: #4a9eff;
    color: #fff;
  }

  .btn-primary:hover { background: #3a8eef; }

  .btn-secondary {
    background: #222;
    color: #ccc;
    border: 1px solid #333;
  }

  .btn-secondary:hover { background: #2a2a2a; }

  label.file-label {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.75rem 1.75rem;
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    color: #ccc;
    cursor: pointer;
    transition: all 0.15s;
  }

  label.file-label:hover { background: #2a2a2a; }

  #file-input { display: none; }

  /* Prompter screen */
  #prompter {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  #toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1.25rem;
    background: #111;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
    z-index: 10;
  }

  #toolbar .left, #toolbar .right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .toolbar-btn {
    background: none;
    border: 1px solid #333;
    color: #ccc;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .toolbar-btn:hover { background: #222; }

  .toolbar-btn.active {
    border-color: #4a9eff;
    color: #4a9eff;
  }

  #mic-status {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    color: #666;
  }

  #mic-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #666;
    transition: background 0.3s;
  }

  #mic-dot.listening {
    background: #ff4444;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #font-size-display {
    color: #888;
    font-size: 0.8rem;
    min-width: 2rem;
    text-align: center;
  }

  /* Script display */
  #script-display {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    scroll-behavior: auto;
  }

  #script-display.auto-scroll {
    overflow-y: hidden;
  }

  #script-scroll {
    padding: 38vh 8vw 60vh 8vw;
    transition: none;
  }

  #script-display.auto-scroll #script-scroll {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  /* Start Here button */
  #start-here-btn {
    display: none;
    position: absolute;
    top: 38vh;
    left: 50%;
    transform: translate(-50%, -120%);
    z-index: 15;
    padding: 0.5rem 1.2rem;
    background: rgba(74, 158, 255, 0.9);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    transition: opacity 0.2s;
  }

  #start-here-btn:hover {
    background: rgba(58, 142, 239, 0.95);
  }

  #script-display:not(.auto-scroll) #start-here-btn {
    display: block;
  }

  #script-scroll .word {
    display: inline;
    transition: color 0.3s, opacity 0.3s;
    color: #555;
    line-height: 1.8;
  }

  #script-scroll .word.spoken {
    color: #fff;
  }

  #script-scroll .word.current {
    color: #4a9eff;
    text-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
  }

  #script-scroll .word.upcoming {
    color: #999;
  }

  /* Stage cues like [Next Slide] */
  #script-scroll .cue {
    display: inline-block;
    color: #f0c040;
    font-size: 0.55em;
    font-weight: 600;
    letter-spacing: 0.03em;
    background: rgba(240, 192, 64, 0.1);
    border: 1px solid rgba(240, 192, 64, 0.25);
    border-radius: 6px;
    padding: 0.15em 0.5em;
    margin: 0 0.2em;
    vertical-align: middle;
    line-height: 1.6;
    transition: opacity 0.3s;
  }

  #script-scroll .cue.spoken {
    opacity: 0.3;
  }

  /* Focus line */
  #focus-line {
    position: absolute;
    top: 38vh;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(74, 158, 255, 0.3), transparent);
    pointer-events: none;
    z-index: 5;
  }

  /* Heard text debug */
  #heard-text {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    color: #888;
    max-width: 80vw;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    z-index: 20;
    display: none;
  }

  #heard-text.visible { display: block; }

  /* Settings for font size */
  .size-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid #333;
    color: #ccc;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
  }

  .size-btn:hover { background: #222; }

  /* Window size presets */
  .window-options {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .window-options label {
    color: #888;
    font-size: 0.85rem;
    margin-right: 0.25rem;
  }

  .preset-btn {
    padding: 0.45rem 0.9rem;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #aaa;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-btn:hover { background: #252525; color: #fff; }

  .preset-btn.active {
    border-color: #4a9eff;
    color: #4a9eff;
    background: rgba(74, 158, 255, 0.08);
  }

  .preset-btn.fullscreen-btn {
    background: #1a1a2a;
    border-color: #4a4a6a;
    color: #8888cc;
  }

  .preset-btn.fullscreen-btn:hover {
    background: #252540;
    color: #aaaaff;
  }

  .custom-size-input {
    width: 60px;
    background: #141414;
    border: 1px solid #333;
    border-radius: 6px;
    color: #ccc;
    font-size: 0.8rem;
    padding: 0.4rem 0.5rem;
    text-align: center;
    outline: none;
  }

  .custom-size-input:focus { border-color: #4a9eff; }

  .custom-size-input::placeholder { color: #555; }

  .size-separator {
    color: #555;
    font-size: 0.8rem;
  }

  /* Script library */
  .library-section {
    width: 100%;
    max-width: 700px;
  }

  .library-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .library-header label {
    color: #888;
    font-size: 0.85rem;
  }

  .save-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  #save-name {
    width: 180px;
    background: #141414;
    border: 1px solid #333;
    border-radius: 6px;
    color: #ccc;
    font-size: 0.8rem;
    padding: 0.4rem 0.6rem;
    outline: none;
  }

  #save-name:focus { border-color: #4a9eff; }
  #save-name::placeholder { color: #555; }

  .save-btn {
    padding: 0.4rem 0.9rem;
    background: #1a2a1a;
    border: 1px solid #2a5a2a;
    border-radius: 6px;
    color: #6c6;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .save-btn:hover { background: #253525; color: #8e8; }

  .script-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    max-height: 150px;
    overflow-y: auto;
    padding-right: 0.25rem;
  }

  .script-list:empty::after {
    content: 'No saved scripts yet';
    color: #555;
    font-size: 0.8rem;
    font-style: italic;
    padding: 0.4rem 0;
  }

  .script-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #141414;
    border: 1px solid #282828;
    border-radius: 6px;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .script-item:hover {
    border-color: #4a9eff;
    background: #1a1a2a;
  }

  .script-item.active {
    border-color: #4a9eff;
    background: rgba(74, 158, 255, 0.08);
  }

  .script-item-info {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    min-width: 0;
    flex: 1;
  }

  .script-item-name {
    color: #ddd;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .script-item-preview {
    color: #666;
    font-size: 0.7rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .script-item-actions {
    display: flex;
    gap: 0.3rem;
    margin-left: 0.5rem;
    flex-shrink: 0;
  }

  .item-btn {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .item-btn:hover { color: #ccc; background: #222; }
  .item-btn.delete:hover { color: #f66; border-color: #f66; }

  /* Mirror mode */
  #script-display.mirrored #script-scroll {
    transform: scaleX(-1);
  }
</style>
</head>
<body>

<div id="setup">
  <h1>PromptSmart</h1>
  <p class="subtitle">Paste or load your script below. The prompter listens to your voice and scrolls to follow along automatically.</p>
  <textarea id="script-input" placeholder="Paste your script here..."></textarea>
  <div class="library-section">
    <div class="library-header">
      <label>Saved Scripts</label>
      <div class="save-row">
        <input type="text" id="save-name" placeholder="Script name...">
        <button class="save-btn" id="save-script-btn">Save</button>
      </div>
    </div>
    <div class="script-list" id="script-list"></div>
  </div>
  <div class="window-options">
    <label>Window:</label>
    <button class="preset-btn" data-w="1024" data-h="768">1024 &times; 768</button>
    <button class="preset-btn" data-w="1280" data-h="800">1280 &times; 800</button>
    <button class="preset-btn" data-w="1920" data-h="1080">1920 &times; 1080</button>
    <span class="size-separator">|</span>
    <input class="custom-size-input" id="custom-w" type="number" placeholder="W" min="400">
    <span class="size-separator">&times;</span>
    <input class="custom-size-input" id="custom-h" type="number" placeholder="H" min="300">
    <button class="preset-btn" id="apply-custom-size">Apply</button>
    <span class="size-separator">|</span>
    <button class="preset-btn fullscreen-btn" id="fullscreen-btn">&#x26F6; Fullscreen</button>
  </div>
  <div class="setup-row">
    <label class="file-label">
      Load file
      <input type="file" id="file-input" accept=".txt,.md,.text,.doc,.docx">
    </label>
    <button class="btn btn-primary" id="start-btn">Start Prompter</button>
  </div>
</div>

<div id="prompter">
  <div id="toolbar">
    <div class="left">
      <button class="toolbar-btn" id="back-btn">Back</button>
      <button class="toolbar-btn" id="reset-btn">Reset</button>
      <button class="toolbar-btn" id="mirror-btn">Mirror</button>
      <button class="toolbar-btn" id="captions-btn">Captions</button>
      <button class="toolbar-btn" id="fullscreen-toggle">Fullscreen</button>
    </div>
    <div class="right">
      <div id="mic-status">
        <div id="mic-dot"></div>
        <span id="mic-label">Off</span>
      </div>
      <button class="size-btn" id="size-down">−</button>
      <span id="font-size-display">48</span>
      <button class="size-btn" id="size-up">+</button>
      <button class="toolbar-btn active" id="listen-btn">Listen</button>
    </div>
  </div>
  <div id="script-display" class="auto-scroll">
    <div id="focus-line"></div>
    <button id="start-here-btn">&#9654; Start Here</button>
    <div id="script-scroll"></div>
  </div>
  <div id="heard-text"></div>
</div>

<script>
const setupEl = document.getElementById('setup');
const prompterEl = document.getElementById('prompter');
const scriptInput = document.getElementById('script-input');
const fileInput = document.getElementById('file-input');
const startBtn = document.getElementById('start-btn');
const backBtn = document.getElementById('back-btn');
const resetBtn = document.getElementById('reset-btn');
const mirrorBtn = document.getElementById('mirror-btn');
const captionsBtn = document.getElementById('captions-btn');
const listenBtn = document.getElementById('listen-btn');
const saveNameInput = document.getElementById('save-name');
const saveScriptBtn = document.getElementById('save-script-btn');
const scriptListEl = document.getElementById('script-list');
const scriptScroll = document.getElementById('script-scroll');
const scriptDisplay = document.getElementById('script-display');
const startHereBtn = document.getElementById('start-here-btn');
const micDot = document.getElementById('mic-dot');
const micLabel = document.getElementById('mic-label');
const heardText = document.getElementById('heard-text');
const fontSizeDisplay = document.getElementById('font-size-display');
const sizeUp = document.getElementById('size-up');
const sizeDown = document.getElementById('size-down');

let words = [];
let wordEls = [];
let isCue = [];
let currentIndex = 0;
let recognition = null;
let isListening = false;
let fontSize = 48;
let showCaptions = false;
let scriptNormalized = [];

function normalize(text) {
  return text.toLowerCase().replace(/[^a-z0-9']/g, '');
}

function parseScript(text) {
  const tokens = [];
  const regex = /\[([^\]]+)\]|(\S+)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    if (match[1] !== undefined) {
      tokens.push({ text: match[1].trim(), cue: true });
    } else {
      tokens.push({ text: match[2], cue: false });
    }
  }
  return tokens;
}

function buildScript(text) {
  scriptScroll.innerHTML = '';
  const tokens = parseScript(text);
  words = [];
  wordEls = [];
  isCue = [];
  scriptNormalized = [];
  currentIndex = 0;

  tokens.forEach((tok, i) => {
    const span = document.createElement('span');
    if (tok.cue) {
      span.className = 'cue';
      span.textContent = tok.text;
      words.push(tok.text);
      isCue.push(true);
      scriptNormalized.push('');
    } else {
      span.className = 'word' + (i === 0 ? ' current' : (i <= 10 ? ' upcoming' : ''));
      span.textContent = tok.text + ' ';
      words.push(tok.text);
      isCue.push(false);
      scriptNormalized.push(normalize(tok.text));
    }
    span.dataset.index = words.length - 1;
    scriptScroll.appendChild(span);
    wordEls.push(span);
  });

  updateFontSize();
  scrollToWord(0);
}

function updateFontSize() {
  scriptScroll.style.fontSize = fontSize + 'px';
  fontSizeDisplay.textContent = fontSize;
}

let isAutoScroll = true;
let manualScrollTimer = null;

function scrollToWord(index) {
  if (index < 0 || index >= wordEls.length) return;
  if (!isAutoScroll) return;
  const el = wordEls[index];
  const displayRect = scriptDisplay.getBoundingClientRect();
  const targetY = displayRect.height * 0.38;
  const wordTop = el.offsetTop;
  const offset = -(wordTop - targetY);
  scriptScroll.style.transform = `translateY(${offset}px)`;
}

function enterManualScroll() {
  if (!isAutoScroll) return;
  isAutoScroll = false;
  scriptDisplay.classList.remove('auto-scroll');
  const currentTransform = scriptScroll.style.transform;
  const match = currentTransform.match(/translateY\((.+?)px\)/);
  const currentOffset = match ? parseFloat(match[1]) : 0;
  scriptScroll.style.transform = 'none';
  scriptDisplay.scrollTop = -currentOffset;
}

function exitManualScroll() {
  isAutoScroll = true;
  scriptDisplay.classList.add('auto-scroll');
  scriptDisplay.scrollTop = 0;
  scrollToWord(currentIndex);
}

function findWordAtFocusLine() {
  const displayRect = scriptDisplay.getBoundingClientRect();
  const focusY = displayRect.top + displayRect.height * 0.38;
  let closest = 0;
  let closestDist = Infinity;
  for (let i = 0; i < wordEls.length; i++) {
    const rect = wordEls[i].getBoundingClientRect();
    const wordMid = rect.top + rect.height / 2;
    const dist = Math.abs(wordMid - focusY);
    if (dist < closestDist) {
      closestDist = dist;
      closest = i;
    }
  }
  return closest;
}

function setStartHere() {
  const targetIndex = findWordAtFocusLine();
  wordEls.forEach((el, i) => {
    if (isCue[i]) {
      el.className = i < targetIndex ? 'cue spoken' : 'cue';
    } else {
      if (i < targetIndex) el.className = 'word spoken';
      else if (i === targetIndex) el.className = 'word current';
      else if (i <= targetIndex + 10) el.className = 'word upcoming';
      else el.className = 'word';
    }
  });
  currentIndex = targetIndex;
  exitManualScroll();
}

scriptDisplay.addEventListener('wheel', (e) => {
  if (isAutoScroll) enterManualScroll();
}, { passive: true });

startHereBtn.addEventListener('click', setStartHere);

function advanceTo(newIndex) {
  if (newIndex <= currentIndex || newIndex >= words.length) return;

  for (let i = currentIndex; i < newIndex; i++) {
    wordEls[i].className = isCue[i] ? 'cue spoken' : 'word spoken';
  }

  // If we landed on a cue, skip forward to the next speakable word
  while (newIndex < words.length && isCue[newIndex]) {
    wordEls[newIndex].className = 'cue spoken';
    newIndex++;
  }
  if (newIndex >= words.length) { currentIndex = words.length - 1; return; }

  wordEls[newIndex].className = 'word current';
  for (let i = newIndex + 1; i < Math.min(newIndex + 12, words.length); i++) {
    if (!wordEls[i].classList.contains('spoken') && !wordEls[i].classList.contains('cue spoken')) {
      wordEls[i].className = isCue[i] ? 'cue' : 'word upcoming';
    }
  }
  currentIndex = newIndex;
  scrollToWord(newIndex);
}

function findBestMatch(spokenWords) {
  if (spokenWords.length === 0) return -1;

  const searchStart = Math.max(0, currentIndex - 2);
  const searchEnd = Math.min(scriptNormalized.length, currentIndex + 60);
  let bestIndex = -1;
  let bestScore = 0;

  for (let i = searchStart; i < searchEnd; i++) {
    if (isCue[i]) continue;
    let matched = 0;
    let pos = i;
    for (let j = 0; j < spokenWords.length && pos < searchEnd; j++) {
      const spoken = spokenWords[j];
      if (spoken.length === 0) continue;

      for (let look = pos; look < Math.min(pos + 5, searchEnd); look++) {
        if (isCue[look]) continue;
        const scriptWord = scriptNormalized[look];
        if (scriptWord === spoken ||
            (spoken.length > 3 && scriptWord.startsWith(spoken)) ||
            (scriptWord.length > 3 && spoken.startsWith(scriptWord)) ||
            levenshtein(spoken, scriptWord) <= Math.max(1, Math.floor(scriptWord.length / 4))) {
          matched++;
          pos = look + 1;
          break;
        }
      }
    }

    if (matched > bestScore && matched >= Math.max(1, spokenWords.length * 0.4)) {
      bestScore = matched;
      bestIndex = pos - 1;
    }
  }

  return bestIndex;
}

function levenshtein(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;
  const matrix = [];
  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      matrix[i][j] = b[i-1] === a[j-1]
        ? matrix[i-1][j-1]
        : Math.min(matrix[i-1][j-1]+1, matrix[i][j-1]+1, matrix[i-1][j]+1);
    }
  }
  return matrix[b.length][a.length];
}

function startRecognition() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Speech recognition is not supported in this browser. Please use Chrome.');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += transcript;
      } else {
        interim += transcript;
      }
    }

    const text = (final + interim).trim();
    if (showCaptions) {
      heardText.textContent = text;
    }

    const spokenWords = text.toLowerCase().replace(/[^a-z0-9' ]/g, '').split(/\s+/).filter(w => w.length > 0);
    const match = findBestMatch(spokenWords);
    if (match > currentIndex) {
      advanceTo(Math.min(match + 1, words.length - 1));
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech' || event.error === 'aborted') return;
    console.error('Speech error:', event.error);
  };

  recognition.onend = () => {
    if (isListening) {
      try { recognition.start(); } catch(e) {}
    }
  };

  try {
    recognition.start();
    isListening = true;
    micDot.classList.add('listening');
    micLabel.textContent = 'Listening';
    listenBtn.classList.add('active');
  } catch(e) {
    console.error('Failed to start recognition:', e);
  }
}

function stopRecognition() {
  isListening = false;
  if (recognition) {
    recognition.abort();
    recognition = null;
  }
  micDot.classList.remove('listening');
  micLabel.textContent = 'Off';
  listenBtn.classList.remove('active');
}

// Script library
function getScripts() {
  try { return JSON.parse(localStorage.getItem('promptsmart_scripts') || '[]'); }
  catch { return []; }
}

function saveScripts(scripts) {
  localStorage.setItem('promptsmart_scripts', JSON.stringify(scripts));
}

function renderScriptList() {
  const scripts = getScripts();
  scriptListEl.innerHTML = '';
  scripts.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'script-item';
    const preview = s.text.substring(0, 80).replace(/\s+/g, ' ');
    item.innerHTML = `
      <div class="script-item-info">
        <span class="script-item-name">${escHtml(s.name)}</span>
        <span class="script-item-preview">${escHtml(preview)}...</span>
      </div>
      <div class="script-item-actions">
        <button class="item-btn load" data-i="${i}">Load</button>
        <button class="item-btn delete" data-i="${i}">&times;</button>
      </div>`;
    scriptListEl.appendChild(item);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

saveScriptBtn.addEventListener('click', () => {
  const text = scriptInput.value.trim();
  if (!text) { alert('Paste or type a script first.'); return; }
  const name = saveNameInput.value.trim() || ('Script ' + (getScripts().length + 1));
  const scripts = getScripts();
  const existing = scripts.findIndex(s => s.name === name);
  if (existing >= 0) {
    scripts[existing].text = text;
  } else {
    scripts.push({ name, text });
  }
  saveScripts(scripts);
  saveNameInput.value = '';
  renderScriptList();
});

scriptListEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.item-btn');
  if (!btn) return;
  const i = parseInt(btn.dataset.i);
  const scripts = getScripts();
  if (btn.classList.contains('load')) {
    scriptInput.value = scripts[i].text;
    document.querySelectorAll('.script-item').forEach((el, j) => {
      el.classList.toggle('active', j === i);
    });
  } else if (btn.classList.contains('delete')) {
    if (confirm(`Delete "${scripts[i].name}"?`)) {
      scripts.splice(i, 1);
      saveScripts(scripts);
      renderScriptList();
    }
  }
});

renderScriptList();

// Window size presets
const presetBtns = document.querySelectorAll('.preset-btn[data-w]');
const customW = document.getElementById('custom-w');
const customH = document.getElementById('custom-h');
const applyCustomSize = document.getElementById('apply-custom-size');
const fullscreenBtn = document.getElementById('fullscreen-btn');

function clearPresetActive() {
  presetBtns.forEach(b => b.classList.remove('active'));
}

presetBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const w = parseInt(btn.dataset.w);
    const h = parseInt(btn.dataset.h);
    window.resizeTo(w, h);
    clearPresetActive();
    btn.classList.add('active');
  });
});

applyCustomSize.addEventListener('click', () => {
  const w = parseInt(customW.value) || 1280;
  const h = parseInt(customH.value) || 800;
  window.resizeTo(w, h);
  clearPresetActive();
});

fullscreenBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    fullscreenBtn.textContent = '⛶ Exit Fullscreen';
  } else {
    document.exitFullscreen();
    fullscreenBtn.textContent = '⛶ Fullscreen';
  }
  clearPresetActive();
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    fullscreenBtn.textContent = '⛶ Fullscreen';
  }
});

// Event listeners
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'docx' || ext === 'doc') {
    const reader = new FileReader();
    reader.onload = (ev) => {
      mammoth.extractRawText({ arrayBuffer: ev.target.result })
        .then(result => { scriptInput.value = result.value; })
        .catch(() => { alert('Could not read this Word file.'); });
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader = new FileReader();
    reader.onload = (ev) => { scriptInput.value = ev.target.result; };
    reader.readAsText(file);
  }
});

startBtn.addEventListener('click', () => {
  const text = scriptInput.value.trim();
  if (!text) { alert('Please enter a script.'); return; }
  setupEl.style.display = 'none';
  prompterEl.style.display = 'flex';
  buildScript(text);
  startRecognition();
});

backBtn.addEventListener('click', () => {
  stopRecognition();
  prompterEl.style.display = 'none';
  setupEl.style.display = 'flex';
});

resetBtn.addEventListener('click', () => {
  currentIndex = 0;
  wordEls.forEach((el, i) => {
    if (isCue[i]) { el.className = 'cue'; }
    else { el.className = 'word' + (i === 0 ? ' current' : (i <= 10 ? ' upcoming' : '')); }
  });
  scrollToWord(0);
});

const fullscreenToggle = document.getElementById('fullscreen-toggle');
fullscreenToggle.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    fullscreenToggle.classList.add('active');
  } else {
    document.exitFullscreen();
    fullscreenToggle.classList.remove('active');
  }
});

document.addEventListener('fullscreenchange', () => {
  fullscreenToggle.classList.toggle('active', !!document.fullscreenElement);
});

mirrorBtn.addEventListener('click', () => {
  scriptDisplay.classList.toggle('mirrored');
  mirrorBtn.classList.toggle('active');
});

captionsBtn.addEventListener('click', () => {
  showCaptions = !showCaptions;
  captionsBtn.classList.toggle('active', showCaptions);
  heardText.classList.toggle('visible', showCaptions);
  if (!showCaptions) heardText.textContent = '';
});

listenBtn.addEventListener('click', () => {
  if (isListening) { stopRecognition(); }
  else { startRecognition(); }
});

sizeUp.addEventListener('click', () => {
  fontSize = Math.min(120, fontSize + 4);
  updateFontSize();
  scrollToWord(currentIndex);
});

sizeDown.addEventListener('click', () => {
  fontSize = Math.max(20, fontSize - 4);
  updateFontSize();
  scrollToWord(currentIndex);
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (prompterEl.style.display !== 'flex') return;
  if (e.key === 'ArrowDown') { advanceTo(Math.min(currentIndex + 5, words.length - 1)); e.preventDefault(); }
  if (e.key === 'ArrowUp') {
    const target = Math.max(0, currentIndex - 5);
    currentIndex = 0;
    wordEls.forEach((el, i) => {
      el.className = 'word' + (i <= target ? ' spoken' : '');
    });
    advanceTo(target);
    e.preventDefault();
  }
  if (e.key === '+' || e.key === '=') { sizeUp.click(); }
  if (e.key === '-') { sizeDown.click(); }
});
</script>
